<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 380px; margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; background: #0d1117; color: #e6edf3; }
    header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #161b22; border-bottom: 1px solid #30363d; }
    header h1 { font-size: 13px; margin: 0; flex: 1; }
    button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 11px; }
    button.primary { background: #238636; border-color: #238636; color: #fff; }
    button:hover { filter: brightness(1.15); }
    #list { max-height: 420px; overflow-y: auto; padding: 8px; }
    .rec { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
    .row { display: flex; gap: 8px; margin: 2px 0; }
    .k { color: #8b949e; min-width: 52px; }
    .v { white-space: pre-wrap; word-break: break-word; }
    .resp { color: #7ee787; }
    .empty { color: #8b949e; padding: 24px 8px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Oximy AI</h1>
    <button id="export" class="primary">Export JSON</button>
    <button id="clear">Clear</button>
  </header>
  <div id="list"><div class="empty">No captures yet.</div></div>
  <script src="popup.js"></script>
</body>
</html>
